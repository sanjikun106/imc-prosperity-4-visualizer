    <script type="text/javascript">
      // GitHub Pages SPA fallback companion script.
      // Restores a path like /repo/?/visualizer back to /repo/visualizer on app load.
      (function (l) {
        if (l.search[1] !== '/') {
          return;
        }

        var decoded = l.search
          .slice(1)
          .split('&')
          .map(function (segment) {
            return segment.replace(/~and~/g, '&');
          })
          .join('?');

        window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
      })(window.location);
    </script>
